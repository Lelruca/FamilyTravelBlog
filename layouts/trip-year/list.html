{{ define "main" }}
<div class="max-w-5xl mx-auto px-4 py-12">
  <header class="mb-10">
    <p class="text-xs uppercase tracking-widest text-neutral-400 mb-2">Year</p>
    <h1 class="font-serif text-4xl font-bold text-neutral-900">{{ .Title }}</h1>
    <p class="text-neutral-500 mt-2">{{ len .Pages }} trip{{ if ne (len .Pages) 1 }}s{{ end }}</p>
  </header>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    {{- range .Pages.ByParam "country" }}
      {{ partial "trip-card.html" . }}
    {{- end }}
  </div>
</div>
{{ end }}
