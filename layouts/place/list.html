{{ define "main" }}
<div class="max-w-5xl mx-auto px-4 py-12">
  {{ partial "breadcrumbs.html" . }}

  <header class="mb-10">
    <p class="text-xs uppercase tracking-widest text-neutral-400 mb-2">Место</p>
    <h1 class="font-serif text-4xl font-bold text-neutral-900">{{ .Title }}</h1>
    <p class="text-neutral-500 mt-2">{{ len .Pages }} стр.</p>
  </header>

  <div class="space-y-3">
    {{- range .Pages.ByDate.Reverse }}
      {{ partial "chapter-card.html" . }}
    {{- end }}
  </div>
</div>
{{ end }}
