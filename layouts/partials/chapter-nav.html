{{- $currentPage := . -}}
{{- $trip := .Parent -}}
{{- $chapters := $trip.Pages.ByWeight -}}
<nav class="bg-neutral-50 rounded-lg p-4 mb-8" aria-label="Trip chapters">
  <h2 class="text-xs font-semibold uppercase tracking-widest text-neutral-400 mb-3">Chapters</h2>
  <ol class="space-y-1">
    {{- range $chapters }}
    <li>
      <a
        href="{{ .RelPermalink }}"
        class="flex items-center gap-2 px-3 py-2 rounded text-sm transition-colors {{ if eq .RelPermalink $currentPage.RelPermalink }}bg-accent/10 text-accent font-medium{{ else }}text-neutral-600 hover:text-accent hover:bg-neutral-100{{ end }}"
      >
        <span class="text-xs uppercase tracking-wide opacity-60 w-20 shrink-0">
          {{ .Params.chapter_kind | default "chapter" }}
        </span>
        <span class="truncate">{{ .Title }}</span>
      </a>
    </li>
    {{- end }}
  </ol>
</nav>
